<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Bienvenido al Club! — Dave Pro Detailing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&family=Barlow+Condensed:wght@600&display=swap" rel="stylesheet" />
  <style>
    :root { --black:#0a0a0a; --gold:#C9A84C; --white:#f5f3ef; --text:#b0a898; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 500px;
      border: 1px solid rgba(201,168,76,0.2);
      padding: 4rem 3rem;
      position: relative;
      animation: fadeUp 0.8s ease forwards;
    }
    .check {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(201,168,76,0.1);
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 2rem;
    }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 1; margin-bottom: 1rem; }
    h1 span { color: var(--gold); }
    p { color: var(--text); line-height: 1.7; font-size: 0.95rem; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: var(--gold);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
    .small { font-size: 0.8rem; margin-top: 1.5rem; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>¡Ya eres <span>Club</span>!</h1>
    <p>
      Tu suscripción está activa. En breve recibirás un email de confirmación con todos los detalles.
    </p>
    <p>
      Escríbenos por WhatsApp para reservar tu primera cita y ponerte en agenda con prioridad.
    </p>
    <a href="https://wa.me/34686369451?text=Hola%20Dave%2C%20acabo%20de%20suscribirme%20al%20Club%20%F0%9F%99%8C%20%C2%BFCu%C3%A1ndo%20podemos%20quedar%3F" target="_blank">
      Reservar cita por WhatsApp →
    </a>
    <p class="small">¿Dudas? <a href="mailto:davekleaner@gmail.com" style="background:none;color:var(--gold);padding:0;">davekleaner@gmail.com</a></p>
  </div>
</body>
</html>
